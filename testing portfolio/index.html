<!DOCTYPE html>
<html lang="en" ng-app="portfolioApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Developer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- AngularJS & ngRoute -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    
    <!-- App Logic -->
    <script src="app.js"></script>
</head>
<body ng-controller="MainController">

    <!-- Navigation -->
    <nav class="navbar" ng-class="{'scrolled': isScrolled}">
        <div class="nav-brand">
            <i class="ph ph-code"></i> DevFolio
        </div>
        <div class="hamburger" ng-click="toggleMenu()">
            <i class="ph" ng-class="menuOpen ? 'ph-x' : 'ph-list'"></i>
        </div>
        <ul class="nav-links" ng-class="{'active': menuOpen}">
            <li><a href="#!/" ng-class="{ 'active': isActive('/') }" ng-click="closeMenu()">Home</a></li>
            <li><a href="#!/about" ng-class="{ 'active': isActive('/about') }" ng-click="closeMenu()">About</a></li>
            <li><a href="#!/projects" ng-class="{ 'active': isActive('/projects') }" ng-click="closeMenu()">Projects</a></li>
            <li><a href="#!/contact" ng-class="{ 'active': isActive('/contact') }" ng-click="closeMenu()">Contact</a></li>
        </ul>
    </nav>

    <!-- Main View Area -->
    <main class="view-container">
        <!-- AngularJS handles injecting templates here -->
        <div ng-view class="view-animate"></div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Developer Portfolio. Built with <i class="ph-fill ph-heart"></i> and AngularJS.</p>
    </footer>

</body>
</html>
