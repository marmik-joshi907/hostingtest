<div class="projects-container">
    <div class="projects-header text-center">
        <h2>Featured <span class="text-gradient">Projects</span></h2>
        <p>A selection of my recent works and technical experiments.</p>
    </div>

    <div class="projects-grid">
        <div class="project-card" ng-repeat="project in projects">
            <div class="project-img-wrapper">
                <img ng-src="{{project.image}}" alt="{{project.title}}" class="project-img">
                <div class="project-overlay">
                    <a href="{{project.link}}" class="btn">View Details</a>
                </div>
            </div>
            <div class="project-content">
                <h3>{{project.title}}</h3>
                <p>{{project.description}}</p>
                <div class="project-tags">
                    <span class="tag" ng-repeat="tag in project.tags">{{tag}}</span>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.projects-container {
    padding: 2rem 0;
}

.text-center {
    text-align: center;
    margin-bottom: 4rem;
}

.projects-header h2 {
    font-size: 3rem;
    margin-bottom: 1rem;
}

.projects-header p {
    color: var(--text-secondary);
    font-size: 1.2rem;
}

.projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2rem;
}

.project-card {
    background: var(--bg-card);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.project-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.project-img-wrapper {
    position: relative;
    height: 200px;
    overflow: hidden;
}

.project-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.project-card:hover .project-img {
    transform: scale(1.1);
}

.project-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.project-card:hover .project-overlay {
    opacity: 1;
}

.project-content {
    padding: 1.5rem;
}

.project-content h3 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
}

.project-content p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
    min-height: 45px;
}

.project-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.tag {
    background: rgba(56, 189, 248, 0.1);
    color: var(--accent);
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
}
</style>
