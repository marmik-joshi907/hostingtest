<div class="contact-container">

    <div class="contact-wrapper glass-card">

        </div>

        <div class="contact-form-container">
            <form name="contactForm" ng-submit="submitForm()" novalidate>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" ng-model="user.name" required placeholder="John Doe" class="form-control">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" ng-model="user.email" required placeholder="john@example.com" class="form-control">
                </div>
                
                <div class="form-group">
                    <label>Message</label>
                    <textarea ng-model="user.message" required rows="4" placeholder="Write your message here..." class="form-control"></textarea>
                </div>
                
                <button type="submit" class="btn" ng-disabled="contactForm.$invalid">Send Message</button>
            </form>
        </div>
    </div>
